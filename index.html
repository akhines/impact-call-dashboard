  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #1a1f36;
      --navy-light:  #242944;
      --navy-border: #2e3455;
      --navy-hover:  #2a3050;
      --bg:          #0f1220;
      --surface:     #1c2138;
      --surface2:    #212640;
      --text:        #e2e8f0;
      --text-muted:  #8892b0;
      --text-dim:    #5a6285;
      --green:       #10b981;
      --green-bg:    rgba(16,185,129,.15);
      --red:         #ef4444;
      --red-bg:      rgba(239,68,68,.15);
      --blue:        #3b82f6;
      --blue-bg:     rgba(59,130,246,.15);
      --purple:      #8b5cf6;
      --purple-bg:   rgba(139,92,246,.15);
      --yellow:      #f59e0b;
      --yellow-bg:   rgba(245,158,11,.15);
      --accent:      #3b82f6;
      --radius:      10px;
      --radius-sm:   6px;
      --shadow:      0 4px 24px rgba(0,0,0,.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--navy); }
    ::-webkit-scrollbar-thumb { background: var(--navy-border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--navy);
      border-right: 1px solid var(--navy-border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--navy-border);
    }
    .sidebar-logo .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--blue), #6366f1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #fff;
      margin-bottom: 10px;
      box-shadow: 0 4px 12px rgba(59,130,246,.4);
    }
    .sidebar-logo h1 {
      font-size: 13px; font-weight: 700;
      color: var(--text); line-height: 1.3;
      letter-spacing: .02em;
    }
    .sidebar-logo p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .sidebar-section { padding: 16px 12px 8px; }
    .sidebar-section-label {
      font-size: 10px; font-weight: 700;
      color: var(--text-dim); letter-spacing: .1em;
      text-transform: uppercase; padding: 0 8px;
      margin-bottom: 6px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: var(--radius-sm);
      color: var(--text-muted); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .15s;
      text-decoration: none;
    }
    .nav-item:hover { background: var(--navy-hover); color: var(--text); }
    .nav-item.active {
      background: var(--blue-bg);
      color: var(--blue);
      font-weight: 600;
    }
    .nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; }
    .nav-badge {
      margin-left: auto; background: var(--blue);
      color: #fff; font-size: 10px; font-weight: 700;
      padding: 1px 7px; border-radius: 20px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px;
      border-top: 1px solid var(--navy-border);
      font-size: 11px;
      color: var(--text-dim);
    }
    .sidebar-footer strong { color: var(--text-muted); display: block; margin-bottom: 2px; }

    /* ── Main ── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 48px;
      min-width: 0;
    }

    /* ── Page Header ── */
    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
    }
    .page-header h2 {
      font-size: 22px; font-weight: 700; color: var(--text);
      letter-spacing: -.01em;
    }
    .page-header p { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; transition: all .15s; white-space: nowrap;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--navy-border);
      color: var(--text-muted);
    }
    .btn-outline:hover { background: var(--navy-hover); color: var(--text); border-color: var(--text-dim); }
    .btn-ghost { background: transparent; color: var(--text-muted); padding: 8px 10px; }
    .btn-ghost:hover { color: var(--text); }

    /* ── Summary Cards ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color .15s;
    }
    .card:hover { border-color: var(--text-dim); }

    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-label {
      font-size: 12px; font-weight: 600;
      color: var(--text-muted); letter-spacing: .04em;
      text-transform: uppercase;
    }
    .card-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .card-icon.blue  { background: var(--blue-bg);   color: var(--blue);   }
    .card-icon.green { background: var(--green-bg);  color: var(--green);  }
    .card-icon.yellow{ background: var(--yellow-bg); color: var(--yellow); }
    .card-icon.purple{ background: var(--purple-bg); color: var(--purple); }

    .card-value {
      font-size: 30px; font-weight: 800;
      color: var(--text); letter-spacing: -.02em; line-height: 1;
      margin-bottom: 6px;
    }
    .card-sub { font-size: 12px; color: var(--text-muted); }
    .card-change {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px; margin-left: 6px;
    }
    .card-change.up   { background: var(--green-bg); color: var(--green); }
    .card-change.down { background: var(--red-bg);   color: var(--red);   }

    /* ── Filters Bar ── */
    .filters-bar {
      background: var(--surface);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 20px;
      display: flex; flex-wrap: wrap; gap: 10px;
      align-items: center;
    }

    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-label { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .07em; }

    .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; width: 100%; }

    select, input[type="text"], input[type="date"] {
      background: var(--surface2);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    select:focus, input:focus { border-color: var(--blue); }
    select option { background: var(--surface2); }

    .search-wrap { position: relative; }
    .search-wrap input { padding-left: 32px; min-width: 200px; }
    .search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim); font-size: 14px; pointer-events: none;
    }

    .date-pill-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .date-pill {
      padding: 6px 13px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      border: 1px solid var(--navy-border);
      background: transparent; color: var(--text-muted);
      cursor: pointer; transition: all .15s;
    }
    .date-pill:hover { border-color: var(--blue); color: var(--blue); }
    .date-pill.active {
      background: var(--blue-bg); border-color: var(--blue); color: var(--blue);
    }

    .filter-divider {
      width: 1px; background: var(--navy-border);
      align-self: stretch; margin: 0 4px;
    }

    /* ── Charts Section ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    @media (max-width: 900px) {
      .charts-grid { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .chart-title {
      font-size: 14px; font-weight: 700;
      color: var(--text); margin-bottom: 4px;
    }
    .chart-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }

    .chart-legend {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ── Third chart row ── */

      background: var(--surface);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    /* ── Call Log Section ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
    }
    .section-title {
      font-size: 16px; font-weight: 700; color: var(--text);

    .section-count {
      font-size: 12px; color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--navy-border);
      padding: 3px 10px; border-radius: 20px;
      margin-left: 8px;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table {
      width: 100%; border-collapse: collapse;
    }
    thead tr {
      background: var(--navy);
      border-bottom: 1px solid var(--navy-border);
    }
    th {
      padding: 11px 14px;
      text-align: left;
      font-size: 11px; font-weight: 700;
      color: var(--text-dim); text-transform: uppercase;
      letter-spacing: .07em; white-space: nowrap;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--text-muted); }
    th .sort-arrow { margin-left: 4px; opacity: .5; }

    tbody tr {
      border-bottom: 1px solid var(--navy-border);
      transition: background .1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--navy-hover); }

    td {
      padding: 11px 14px;
      font-size: 13px; color: var(--text);
      vertical-align: middle;
    }
    td.muted { color: var(--text-muted); }
    td.mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: var(--text-muted); }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .badge-green  { background: var(--green-bg);  color: var(--green);  }
    .badge-red    { background: var(--red-bg);    color: var(--red);    }
    .badge-blue   { background: var(--blue-bg);   color: var(--blue);   }
    .badge-purple { background: var(--purple-bg); color: var(--purple); }
    .badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
    .badge-gray   { background: rgba(100,116,139,.15); color: #94a3b8; }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-top: 1px solid var(--navy-border);
      background: var(--navy);
      flex-wrap: wrap; gap: 10px;
    }
    .pagination-info { font-size: 12px; color: var(--text-muted); }
    .pagination-controls { display: flex; gap: 4px; align-items: center; }
    .page-btn {
      width: 30px; height: 30px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--navy-border);
      background: transparent; color: var(--text-muted);
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover { background: var(--navy-hover); color: var(--text); }
    .page-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    .page-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* ── Tooltip custom ── */
    .recharts-tooltip-wrapper { outline: none; }
    .custom-tooltip {
      background: var(--navy);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      box-shadow: var(--shadow);
    }
    .custom-tooltip .tt-label { color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
    .custom-tooltip .tt-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
    .custom-tooltip .tt-dot { width: 8px; height: 8px; border-radius: 50%; }
    .custom-tooltip .tt-key { color: var(--text-muted); }
    .custom-tooltip .tt-val { color: var(--text); font-weight: 700; margin-left: auto; padding-left: 12px; }

    /* ── Empty state ── */
    .empty-state {
      padding: 48px; text-align: center;
      color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #main { padding: 16px; }
    }
  </style>
</head>

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
function parseDurationSecs(d) {
  if (!d || d === "0s" || d === "-") return 0;
  const m = d.match(/(?:(\d+)m\s*)?(\d+)s/);
  if (!m) return 0;
  return (parseInt(m[1] || 0) * 60) + parseInt(m[2] || 0);
}

function formatDurationAvg(secs) {
  if (secs === 0) return "0s";
  const m = Math.floor(secs / 60);
  const s = Math.round(secs % 60);
  if (m === 0) return `${s}s`;
  return `${m}m ${s}s`;
}

function parseDate(dateStr) {
  return new Date(dateStr);
}

function isLead(name) {
  if (!name) return false;
  const n = name.trim();
  if (n.startsWith("*")) return true;
  // name ends with *TV and starts with * handled above
  return false;
}

function getPipeline(name) {
  if (!name) return "N/A";
  const n = name.trim();
  if (n.toUpperCase().startsWith("NOT A LEAD") || n === "Unknown" || n === "Not a lead") return "N/A";
  if (n.startsWith("*") || n.includes("*TV")) return "Seller Lead > Qualified";
  return "N/A";
}

function getNextContact(row) {
  const name = row[2] || "";
  const n = name.trim();
  if (n.toUpperCase().startsWith("NOT A LEAD") || n === "Unknown" || n === "Not a lead") return "N/A";
  if (!n.startsWith("*") && !n.includes("*")) return "N/A";
  // 2-3 days after call
  const d = parseDate(row[0]);
  d.setDate(d.getDate() + 2);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function getConnectedStatus(row) {
  const connected = row[6];
  const result = row[8];
  if (connected === "Connected" || result === "Connected") return "connected";
  if (connected === "No" || result === "No Connection") return "missed";
  return "unknown";
}

const CALLS = RAW.map((r, i) => ({
  id: i,
  date: r[0],
  time: r[1],
  contactName: r[2],
  callerPhone: r[3],
  trackingPhone: r[4],
  numberName: r[5],
  connectedRaw: r[6],
  duration: r[7],
  result: r[8],
  pipelineRaw: r[9],
  nextContactRaw: r[10],
  recording: r[11],
  isLead: isLead(r[2]),
  pipeline: getPipeline(r[2]),
  nextContact: getNextContact(r),
  connectedStatus: getConnectedStatus(r),
  durationSecs: parseDurationSecs(r[7]),
  dateObj: parseDate(r[0]),
}));

const NUMBER_NAMES = ["All Numbers", ...Array.from(new Set(CALLS.map(c => c.numberName)))];

/* ═══════════════════════════════════════════════════
   CHART DATA HELPERS
═══════════════════════════════════════════════════ */
function buildDailyVolume(calls) {
  const map = {};
  calls.forEach(c => {
    const k = c.date;
    if (!map[k]) map[k] = { date: k, connected: 0, missed: 0, unknown: 0 };
    map[k][c.connectedStatus]++;
  });
  return Object.values(map)
    .sort((a, b) => new Date(a.date) - new Date(b.date))
    .map(r => ({ ...r, dateShort: r.date.replace(" 2026", "").replace("Mar ", "Mar ") }));
}

function buildConnectionPie(calls) {
  const connected = calls.filter(c => c.connectedStatus === "connected").length;
  const missed = calls.filter(c => c.connectedStatus === "missed").length;
  const unknown = calls.filter(c => c.connectedStatus === "unknown").length;
  return [
    { name: "Connected", value: connected, color: "#10b981" },
    { name: "No Connection", value: missed, color: "#ef4444" },
    { name: "Unknown", value: unknown, color: "#6366f1" },
  ].filter(d => d.value > 0);
}

function buildByNumber(calls) {
  const map = {};
  calls.forEach(c => {
    if (!map[c.numberName]) map[c.numberName] = { name: c.numberName, calls: 0, connected: 0 };
    map[c.numberName].calls++;
    if (c.connectedStatus === "connected") map[c.numberName].connected++;
  });
  return Object.values(map).sort((a, b) => b.calls - a.calls);
}

/* ═══════════════════════════════════════════════════
   COMPONENTS
═══════════════════════════════════════════════════ */

function BarTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  return (
    <div className="custom-tooltip">
      <div className="tt-label">{label}</div>
      {payload.map((p, i) => (
        <div key={i} className="tt-row">
          <div className="tt-dot" style={{ background: p.fill }} />
          <span className="tt-key">{p.name}</span>
          <span className="tt-val">{p.value}</span>
        </div>
      ))}
    </div>
  );
}

function PieTooltip({ active, payload }) {
  if (!active || !payload?.length) return null;
  const d = payload[0];
  return (
    <div className="custom-tooltip">
      <div className="tt-row">
        <div className="tt-dot" style={{ background: d.payload.color }} />
        <span className="tt-key">{d.name}</span>
        <span className="tt-val">{d.value}</span>
      </div>
    </div>
  );
}

function NumberTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  return (
    <div className="custom-tooltip">
      <div className="tt-label">{label}</div>
      {payload.map((p, i) => (
        <div key={i} className="tt-row">
          <div className="tt-dot" style={{ background: p.fill }} />
          <span className="tt-key">{p.name}</span>
          <span className="tt-val">{p.value}</span>
        </div>
      ))}
    </div>
  );
}

function ConnectedBadge({ status }) {
  if (status === "connected") return <span className="badge badge-green"><span className="badge-dot" />Connected</span>;
  if (status === "missed") return <span className="badge badge-red"><span className="badge-dot" />No Connection</span>;
  return <span className="badge badge-gray">—</span>;
}

function RecordingBadge({ val }) {
  if (val === "Recording") return <span className="badge badge-purple">▶ Recording</span>;
  return <span className="badge badge-gray">No Rec.</span>;
}

function ContactName({ name, lead }) {
  const display = name.replace(/^\*/, "").replace(/\*TV$/, "").trim() || name;
  return (
    <span style={{ display: "flex", alignItems: "center", gap: "6px", flexWrap: "wrap" }}>
      {display}
      {lead && <span className="badge badge-blue">LEAD</span>}
    </span>
  );
}

/* ═══════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════ */
function App() {
  const [dateFilter, setDateFilter] = useState("This Month");
  const [numberFilter, setNumberFilter] = useState("All Numbers");
  const [connectedFilter, setConnectedFilter] = useState("All");
  const [search, setSearch] = useState("");
  const [page, setPage] = useState(1);
  const PAGE_SIZE = 10;

  const todayStr = "Mar 29 2026";
  const today = new Date("Mar 29 2026");

  const filtered = useMemo(() => {
    let data = [...CALLS];

    // Date filter
    if (dateFilter === "Today") {
      data = data.filter(c => c.date === "Mar 28 2026" || c.date === todayStr);
      // use Mar 28 as "today" since data has Mar 28 as latest
      data = data.filter(c => c.date === "Mar 28 2026");
    } else if (dateFilter === "Yesterday") {
      data = data.filter(c => c.date === "Mar 27 2026");
    } else if (dateFilter === "This Week") {
      // Mar 23–29
      const weekStart = new Date("Mar 23 2026");
      data = data.filter(c => c.dateObj >= weekStart);
    } else if (dateFilter === "This Month") {
      data = data.filter(c => c.date.includes("Mar 2026"));
    }

    // Number filter
    if (numberFilter !== "All Numbers") {
      data = data.filter(c => c.numberName === numberFilter);
    }

    // Connected filter
    if (connectedFilter === "Connected") {
      data = data.filter(c => c.connectedStatus === "connected");
    } else if (connectedFilter === "No Connection") {
      data = data.filter(c => c.connectedStatus === "missed");
    }

    // Search
    if (search.trim()) {
      const q = search.toLowerCase();
      data = data.filter(c =>
        c.contactName.toLowerCase().includes(q) ||
        c.callerPhone.includes(q) ||
        c.numberName.toLowerCase().includes(q)
      );
    }

    return data;
  }, [dateFilter, numberFilter, connectedFilter, search]);

  // Summary stats
  const stats = useMemo(() => {
    const total = filtered.length;
    const connected = filtered.filter(c => c.connectedStatus === "connected").length;
    const answerRate = total > 0 ? Math.round((connected / total) * 100) : 0;
    const totalSecs = filtered.reduce((a, c) => a + c.durationSecs, 0);
    const avgSecs = total > 0 ? Math.round(totalSecs / total) : 0;
    const uniqueLeads = new Set(
      filtered.filter(c => c.isLead).map(c => c.callerPhone)
    ).size;
    return { total, answerRate, avgSecs, uniqueLeads };
  }, [filtered]);

  const dailyVolume = useMemo(() => buildDailyVolume(filtered), [filtered]);
  const pieSections = useMemo(() => buildConnectionPie(filtered), [filtered]);
  const byNumber = useMemo(() => buildByNumber(filtered), [filtered]);

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const paginated = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);

  const clearFilters = useCallback(() => {
    setDateFilter("This Month");
    setNumberFilter("All Numbers");
    setConnectedFilter("All");
    setSearch("");
    setPage(1);
  }, []);

  const handleFilter = useCallback((setter) => (val) => {
    setter(val);
    setPage(1);
  }, []);

  return (
    <React.Fragment>
      {/* ── Sidebar ── */}
      <nav id="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon">IH</div>
          <h1>Impact Home Team</h1>
          <p>Call Tracking Dashboard</p>
        </div>

        <div className="sidebar-section">
          <div className="sidebar-section-label">Analytics</div>
          <a className="nav-item active">
            <span className="nav-icon">📞</span>
            Call Activity
            <span className="nav-badge">{CALLS.length}</span>
          </a>
          <a className="nav-item">
            <span className="nav-icon">📊</span>
            Performance
          </a>
          <a className="nav-item">
            <span className="nav-icon">🎯</span>
            Lead Pipeline
          </a>
          <a className="nav-item">
            <span className="nav-icon">📈</span>
            Conversion
          </a>
        </div>

        <div className="sidebar-section">
          <div className="sidebar-section-label">Tracking Numbers</div>
          <a className="nav-item">
            <span className="nav-icon">📍</span>
            Google Ads
          </a>
          <a className="nav-item">
            <span className="nav-icon">🌐</span>
            Web Leads (SEO)
          </a>
          <a className="nav-item">
            <span className="nav-icon">📌</span>
            GMB Impact Home
          </a>
          <a className="nav-item">
            <span className="nav-icon">👤</span>
            Agent Numbers
          </a>
        </div>

        <div className="sidebar-section">
          <div className="sidebar-section-label">Settings</div>
          <a className="nav-item">
            <span className="nav-icon">⚙️</span>
            Integrations
          </a>
          <a className="nav-item">
            <span className="nav-icon">🔔</span>
            Notifications
          </a>
        </div>

        <div className="sidebar-footer">
          <strong>Impact Home Team</strong>
          Baltimore, MD · Real Estate
        </div>
      </nav>

      {/* ── Main Content ── */}
      <main id="main">

        {/* Page Header */}
        <div className="page-header">
          <div>
            <h2>Call Activity</h2>
            <p>Inbound lead tracking &amp; call analytics — {dateFilter}</p>
          </div>
          <div className="header-actions">
            <button className="btn btn-outline">⬇ Export CSV</button>
            <button className="btn btn-primary">＋ Add Number</button>
          </div>
        </div>

        {/* Summary Cards */}
        <div className="cards-grid">
          <div className="card">
            <div className="card-header">
              <span className="card-label">Total Calls</span>
              <span className="card-icon blue">📞</span>
            </div>
            <div className="card-value">{stats.total}</div>
            <div className="card-sub">
              Inbound calls
              <span className="card-change up">↑ 12%</span>
            </div>
          </div>

          <div className="card">
            <div className="card-header">
              <span className="card-label">Answer Rate</span>
              <span className="card-icon green">✅</span>
            </div>
            <div className="card-value">{stats.answerRate}%</div>
            <div className="card-sub">
              {filtered.filter(c => c.connectedStatus === "connected").length} connected
              <span className="card-change up">↑ 5%</span>
            </div>
          </div>

          <div className="card">
            <div className="card-header">
              <span className="card-label">Avg Duration</span>
              <span className="card-icon yellow">⏱</span>
            </div>
            <div className="card-value">{formatDurationAvg(stats.avgSecs)}</div>
            <div className="card-sub">
              Per connected call
              <span className="card-change down">↓ 3%</span>
            </div>
          </div>

          <div className="card">
            <div className="card-header">
              <span className="card-label">Unique Leads</span>
              <span className="card-icon purple">🎯</span>
            </div>
            <div className="card-value">{stats.uniqueLeads}</div>
            <div className="card-sub">
              Unique callers (*)
              <span className="card-change up">↑ 8%</span>
            </div>
          </div>
        </div>

        {/* Filters Bar */}
        <div className="filters-bar">
          <div className="filter-row">
            {/* Date pills */}
            <div className="filter-group">
              <div className="filter-label">Date Range</div>
              <div className="date-pill-row">
                {["Today","Yesterday","This Week","This Month"].map(d => (
                  <button
                    key={d}
                    className={`date-pill${dateFilter === d ? " active" : ""}`}
                    onClick={() => handleFilter(setDateFilter)(d)}
                  >{d}</button>
                ))}
              </div>
            </div>

            <div className="filter-divider" />

            {/* Number Name */}
            <div className="filter-group">
              <div className="filter-label">Tracking Number</div>
              <select
                value={numberFilter}
                onChange={e => handleFilter(setNumberFilter)(e.target.value)}
              >
                {NUMBER_NAMES.map(n => <option key={n}>{n}</option>)}
              </select>
            </div>

            {/* Connected */}
            <div className="filter-group">
              <div className="filter-label">Connection</div>
              <select
                value={connectedFilter}
                onChange={e => handleFilter(setConnectedFilter)(e.target.value)}
              >
                <option value="All">All Statuses</option>
                <option value="Connected">Connected</option>
                <option value="No Connection">No Connection</option>
              </select>
            </div>

            {/* Search */}
            <div className="filter-group" style={{ flex: 1, minWidth: 180 }}>
              <div className="filter-label">Search</div>
              <div className="search-wrap">
                <span className="search-icon">🔍</span>
                <input
                  type="text"
                  placeholder="Name, phone, number…"
                  value={search}
                  onChange={e => { setSearch(e.target.value); setPage(1); }}
                  style={{ width: "100%" }}
                />
              </div>
            </div>

            <div style={{ display: "flex", alignItems: "flex-end" }}>
              <button className="btn btn-outline" onClick={clearFilters}>✕ Clear</button>
            </div>
          </div>
        </div>

        {/* Charts Row 1: Daily Volume + Pie */}
        <div className="charts-grid">
          {/* Daily Call Volume */}
          <div className="chart-card">
            <div className="chart-title">Daily Call Volume</div>
            <div className="chart-sub">Inbound calls per day, by connection status</div>
            <div className="chart-legend">
              <div className="legend-item">
                <div className="legend-dot" style={{ background: "#10b981" }} />
                Connected
              </div>
              <div className="legend-item">
                <div className="legend-dot" style={{ background: "#ef4444" }} />
                No Connection
              </div>
              <div className="legend-item">
                <div className="legend-dot" style={{ background: "#6366f1" }} />
                Unknown
              </div>
            </div>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={dailyVolume} margin={{ top: 0, right: 0, left: -20, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2e3455" vertical={false} />
                <XAxis
                  dataKey="dateShort"
                  tick={{ fill: "#8892b0", fontSize: 11 }}
                  axisLine={false} tickLine={false}
                  interval="preserveStartEnd"
                />
                <YAxis
                  tick={{ fill: "#8892b0", fontSize: 11 }}
                  axisLine={false} tickLine={false}
                  allowDecimals={false}
                />
                <Tooltip content={<BarTooltip />} cursor={{ fill: "rgba(59,130,246,.08)" }} />
                <Bar dataKey="connected" name="Connected" stackId="a" fill="#10b981" radius={[0,0,0,0]} />
                <Bar dataKey="missed" name="No Connection" stackId="a" fill="#ef4444" radius={[0,0,0,0]} />
                <Bar dataKey="unknown" name="Unknown" stackId="a" fill="#6366f1" radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* Connection Rate Donut */}
          <div className="chart-card">
            <div className="chart-title">Connection Rate</div>
            <div className="chart-sub">Breakdown of call outcomes</div>
            <ResponsiveContainer width="100%" height={220}>
              <PieChart>
                <Pie
                  data={pieSections}
                  cx="50%"
                  cy="45%"
                  innerRadius={60}
                  outerRadius={90}
                  paddingAngle={3}
                  dataKey="value"
                >
                  {pieSections.map((entry, index) => (
                    <Cell key={`cell-${index}`} fill={entry.color} stroke="transparent" />
                  ))}
                </Pie>
                <Tooltip content={<PieTooltip />} />
                <Legend
                  iconType="circle"
                  iconSize={8}
                  formatter={(val) => <span style={{ color: "#8892b0", fontSize: 12 }}>{val}</span>}
                />
              </PieChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Charts Row 2: Calls by Tracking Number */}
        <div className="chart-full">
          <div className="chart-title">Calls by Tracking Number</div>
          <div className="chart-sub">Total inbound calls vs connected calls per source</div>
          <div className="chart-legend">
            <div className="legend-item">
              <div className="legend-dot" style={{ background: "#3b82f6" }} />
              Total Calls
            </div>
            <div className="legend-item">
              <div className="legend-dot" style={{ background: "#10b981" }} />
              Connected
            </div>
          </div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart
              data={byNumber}
              margin={{ top: 0, right: 0, left: -20, bottom: 0 }}
              layout="horizontal"
            >
              <CartesianGrid strokeDasharray="3 3" stroke="#2e3455" vertical={false} />
              <XAxis
                dataKey="name"
                tick={{ fill: "#8892b0", fontSize: 11 }}
                axisLine={false} tickLine={false}
              />
              <YAxis
                tick={{ fill: "#8892b0", fontSize: 11 }}
                axisLine={false} tickLine={false}
                allowDecimals={false}
              />
              <Tooltip content={<NumberTooltip />} cursor={{ fill: "rgba(59,130,246,.08)" }} />
              <Bar dataKey="calls" name="Total Calls" fill="#3b82f6" radius={[4,4,0,0]} />
              <Bar dataKey="connected" name="Connected" fill="#10b981" radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>

        {/* Call Log Table */}
        <div>
          <div className="section-header">
            <div style={{ display: "flex", alignItems: "center" }}>
              <span className="section-title">Call Log</span>
              <span className="section-count">{filtered.length} calls</span>

            <div style={{ display: "flex", gap: "8px" }}>
              <button className="btn btn-outline">↕ Sort</button>
              <button className="btn btn-outline">⚙ Columns</button>
            </div>
          </div>

          <div className="table-wrap">
            {filtered.length === 0 ? (
              <div className="empty-state">
                <div className="empty-icon">📭</div>
                <p>No calls match your filters.</p>
              </div>
            ) : (
              <React.Fragment>
                <table>
                  <thead>
                    <tr>
                      <th className="sortable">Date / Time <span className="sort-arrow">↕</span></th>
                      <th>Contact Name</th>
                      <th>Caller Phone</th>
                      <th>Number Name</th>
                      <th>Connected</th>
                      <th>Duration</th>
                      <th>Recording</th>
                      <th>Pipeline / Stage</th>
                      <th>Next Contact</th>
                    </tr>
                  </thead>
                  <tbody>
                    {paginated.map(c => (
                      <tr key={c.id}>
                        <td>
                          <div style={{ fontWeight: 600, fontSize: 12 }}>{c.date}</div>
                          <div style={{ color: "var(--text-muted)", fontSize: 11 }}>{c.time}</div>
                        </td>
                        <td>
                          <ContactName name={c.contactName} lead={c.isLead} />
                        </td>
                        <td className="mono">{c.callerPhone}</td>
                        <td>
                          <span style={{ color: "var(--text-muted)", fontSize: 12 }}>{c.numberName}</span>
                        </td>
                        <td><ConnectedBadge status={c.connectedStatus} /></td>
                        <td className="muted" style={{ fontVariantNumeric: "tabular-nums" }}>
                          {c.duration === "0s" ? <span style={{ color: "var(--text-dim)" }}>—</span> : c.duration}
                        </td>
                        <td><RecordingBadge val={c.recording} /></td>
                        <td>
                          {c.pipeline === "N/A"
                            ? <span style={{ color: "var(--text-dim)" }}>N/A</span>
                            : <span style={{ color: "var(--blue)", fontSize: 12 }}>{c.pipeline}</span>
                          }
                        </td>
                        <td className="muted" style={{ fontSize: 12, whiteSpace: "nowrap" }}>
                          {c.nextContact === "N/A"
                            ? <span style={{ color: "var(--text-dim)" }}>N/A</span>
                            : c.nextContact
                          }
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>

                {/* Pagination */}
                {totalPages > 1 && (
                  <div className="pagination">
                    <div className="pagination-info">
                      Showing {(page - 1) * PAGE_SIZE + 1}–{Math.min(page * PAGE_SIZE, filtered.length)} of {filtered.length} calls
                    </div>
                    <div className="pagination-controls">
                      <button
                        className="page-btn"
                        onClick={() => setPage(p => Math.max(1, p - 1))}
                        disabled={page === 1}
                      >‹</button>
                      {Array.from({ length: totalPages }, (_, i) => i + 1).map(p => (
                        <button
                          key={p}
                          className={`page-btn${p === page ? " active" : ""}`}
                          onClick={() => setPage(p)}
                        >{p}</button>
                      ))}
                      <button
                        className="page-btn"
                        onClick={() => setPage(p => Math.min(totalPages, p + 1))}
                        disabled={page === totalPages}
                      >›</button>
                    </div>
                  </div>
                )}
              </React.Fragment>
            )}
          </div>
        </div>
      </main>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
